<!DOCTYPE html>
<html>
<head>
    <title>ICONIC BROWN</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background: linear-gradient(to bottom, #0d0d0d, #1a1a1a);
            color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 60px;
            letter-spacing: 3px;
            color: #c8a165;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }

        .hero {
            padding: 100px 20px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background-color: #c8a165;
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 25px;
        }

        .section {
            padding: 60px 20px;
        }

        .gallery img {
            width: 200px;
            margin: 10px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        footer {
            padding: 20px;
            font-size: 14px;
            opacity: 0.6;
        }

        /* ⭐ STARS */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .stars span {
            position: absolute;
            color: #c8a165;
            font-size: 20px;
            animation: float 10s linear infinite;
        }

        .stars span:nth-child(1) { left: 10%; animation-delay: 0s; }
        .stars span:nth-child(2) { left: 30%; animation-delay: 2s; }
        .stars span:nth-child(3) { left: 50%; animation-delay: 4s; }
        .stars span:nth-child(4) { left: 70%; animation-delay: 6s; }
        .stars span:nth-child(5) { left: 90%; animation-delay: 8s; }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* 🍵 TEAPOTS */
        .teapot {
            position: fixed;
            font-size: 30px;
            animation: floatTea 15s linear infinite;
            opacity: 0.7;
        }

        .teapot:nth-child(1) { left: 15%; animation-delay: 0s; }
        .teapot:nth-child(2) { left: 55%; animation-delay: 5s; }
        .teapot:nth-child(3) { left: 85%; animation-delay: 10s; }

        @keyframes floatTea {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>

<body>

    <!-- ⭐ STARS -->
    <div class="stars">
        <span>✦</span>
        <span>★</span>
        <span>✧</span>
        <span>✦</span>
        <span>★</span>
    </div>

    <!-- 🍵 TEAPOTS -->
    <div class="teapot">🫖</div>
    <div class="teapot">🫖</div>
    <div class="teapot">🫖</div>

    <div class="hero">
        <h1>ICONIC BROWN</h1>
        <p>Art • Aesthetic • Dreams</p>
        <a href="#art"><button class="btn">Explore</button></a>
    </div>

    <div class="section">
        <h2>About Me</h2>
        <p>Hi, I’m Mooni. I create aesthetic art, fashion sketches, and dreamy visuals.</p>
    </div>

    <div class="section gallery" id="art">
        <h2>My Art</h2>
        <img src="https://via.placeholder.com/200">
        <img src="https://via.placeholder.com/200">
        <img src="https://via.placeholder.com/200">
    </div>

    <footer>
        © 2026 ICONIC BROWN | Made by Mooni ✨
    </footer>

</body>
</html>
