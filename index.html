<!DOCTYPE html>
<html>
<head>
    <title>ICONIC BROWN</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background: linear-gradient(to bottom, #0d0d0d, #1a1a1a);
            color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 65px;
            color: #c8a165;
            font-family: 'Pacifico', cursive;
        }

        .hero { padding: 100px 20px; }

        .btn {
            margin: 20px;
            padding: 12px 25px;
            background-color: #c8a165;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }

        .section { padding: 80px 20px; }

        /* ✨ SPARKLE */
        .sparkle {
            position: fixed;
            color: #c8a165;
            animation: sparkle 1s linear forwards;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% { opacity: 1; }
            100% { opacity: 0; transform: scale(2); }
        }

        /* ⭐ STARS */
        .stars span {
            position: fixed;
            color: #c8a165;
            font-size: 20px;
            animation: float 10s linear infinite;
        }

        .stars span:nth-child(1){ left:10%; }
        .stars span:nth-child(2){ left:40%; }
        .stars span:nth-child(3){ left:70%; }
        .stars span:nth-child(4){ left:85%; }

        @keyframes float {
            0% { transform: translateY(100vh); opacity:0; }
            50% { opacity:1; }
            100% { transform: translateY(-10vh); opacity:0; }
        }

        /* 🍵 TEAPOTS */
        .teapot {
            position: fixed;
            font-size: 28px;
            animation: floatTea 15s linear infinite;
            opacity: 0.7;
        }

        .teapot:nth-child(1){ left:15%; animation-delay:0s; }
        .teapot:nth-child(2){ left:55%; animation-delay:5s; }
        .teapot:nth-child(3){ left:85%; animation-delay:10s; }

        @keyframes floatTea {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* 🎴 CARD */
        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            margin: 15px;
            display: inline-block;
            width: 200px;
            border: 1px solid #c8a165;
        }

    </style>
</head>

<body>

    <!-- ⭐ STARS -->
    <div class="stars">
        <span>✦</span>
        <span>★</span>
        <span>✧</span>
        <span>✦</span>
    </div>

    <!-- 🍵 TEAPOTS -->
    <div class="teapot">🫖</div>
    <div class="teapot">🫖</div>
    <div class="teapot">🫖</div>

    <div class="hero">
        <h1>ICONIC BROWN</h1>
        <p>Hello there ✨</p>
        <button class="btn" onclick="goExplore(event)">Explore</button>
    </div>

    <div class="section" id="explore">
        <h2>Create Your OC 💫</h2>

        <input id="name" placeholder="Name"><br>
        <input id="habit" placeholder="Habit"><br>
        <input id="color" placeholder="Favorite Color"><br>

        <button class="btn" onclick="createOC()">Create OC</button>

        <div id="cards"></div>
    </div>

    <script>
        function goExplore(e){
            document.getElementById("explore").scrollIntoView();

            for(let i=0;i<20;i++){
                let s=document.createElement("div");
                s.innerHTML="✦";
                s.className="sparkle";

                s.style.left=(e.clientX + Math.random()*50 - 25)+"px";
                s.style.top=(e.clientY + Math.random()*50 - 25)+"px";

                document.body.appendChild(s);
                setTimeout(()=>s.remove(),1000);
            }
        }

        function createOC(){
            let name=document.getElementById("name").value;
            let habit=document.getElementById("habit").value;
            let color=document.getElementById("color").value;

            if(name==="") return;

            let card=document.createElement("div");
            card.className="card";

            card.innerHTML=`
                <h3>${name}</h3>
                <p>Habit: ${habit}</p>
                <p>Fav Color: ${color}</p>
            `;

            document.getElementById("cards").appendChild(card);

            let data=JSON.parse(localStorage.getItem("ocs")||"[]");
            data.push({name,habit,color});
            localStorage.setItem("ocs",JSON.stringify(data));
        }

        window.onload=function(){
            let data=JSON.parse(localStorage.getItem("ocs")||"[]");

            data.forEach(d=>{
                let card=document.createElement("div");
                card.className="card";
                card.innerHTML=`
                    <h3>${d.name}</h3>
                    <p>Habit: ${d.habit}</p>
                    <p>Fav Color: ${d.color}</p>
                `;
                document.getElementById("cards").appendChild(card);
            });
        }
    </script>

</body>
</html>
