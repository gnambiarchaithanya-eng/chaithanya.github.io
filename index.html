<!DOCTYPE html>
<html>
<head>
    <title>ICONIC BROWN</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background: linear-gradient(to bottom, #0d0d0d, #1a1a1a);
            color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 65px;
            color: #c8a165;
            font-family: 'Pacifico', cursive;
        }

        .hero { padding: 100px 20px; }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #c8a165;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .section { padding: 80px 20px; }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            width: 200px;
        }

        /* ⭐ SPARKLE */
        .sparkle {
            position: fixed;
            pointer-events: none;
            color: #c8a165;
            animation: sparkle 1s linear forwards;
        }

        @keyframes sparkle {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(2); }
        }

        /* ⭐ STARS */
        .stars span {
            position: fixed;
            color: #c8a165;
            animation: float 10s linear infinite;
        }

        .stars span:nth-child(1){ left:10%; }
        .stars span:nth-child(2){ left:40%; }
        .stars span:nth-child(3){ left:70%; }

        @keyframes float {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-10vh); }
        }

    </style>
</head>

<body>

    <!-- ⭐ stars -->
    <div class="stars">
        <span>✦</span>
        <span>★</span>
        <span>✧</span>
    </div>

    <div class="hero">
        <h1>ICONIC BROWN</h1>
        <p>Hello there ✨</p>
        <button class="btn" onclick="goExplore(event)">Explore</button>
    </div>

    <!-- ✨ EXPLORE SECTION -->
    <div class="section" id="explore">
        <h2>Hi, want to create your own OC? then you’re at the right place &lt;3</h2>

        <p>Enter your OC details 👇</p>

        <input type="text" placeholder="Name"><br>
        <input type="text" placeholder="Habit"><br>
        <input type="text" placeholder="Favorite Color"><br>
    </div>

    <script>
        function goExplore(e) {
            // scroll
            document.getElementById("explore").scrollIntoView();

            // sparkle effect
            for(let i=0;i<15;i++){
                let star = document.createElement("div");
                star.innerHTML = "✦";
                star.className = "sparkle";

                star.style.left = (e.clientX + Math.random()*50 - 25) + "px";
                star.style.top = (e.clientY + Math.random()*50 - 25) + "px";

                document.body.appendChild(star);

                setTimeout(()=>{ star.remove(); },1000);
            }
        }
    </script>

</body>
</html>
